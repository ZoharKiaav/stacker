name: Build and Push Stacker to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=ghcr.io/${REPO_LC}/stacker:latest" >> "$GITHUB_ENV"
          echo "Using image: ghcr.io/${REPO_LC}/stacker:latest"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Create production environment file
        shell: bash
        run: |
          cat > .env.production <<'EOF'
          NODE_ENV=production
          NEXT_PUBLIC_APP_NAME=Stacker
          NEXT_PUBLIC_PAGE_TITLE=Stacker
          NEXT_PUBLIC_SITE_URL=https://stacker.proniit.com
          EOF

      - name: Build image
        run: |
          docker build --progress=plain -t "$IMAGE_NAME" .

      - name: Push image
        run: |
          docker push "$IMAGE_NAME"