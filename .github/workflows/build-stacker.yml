name: Build Stacker Image

on:
  push:
    branches:
      - latest
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zoharkiaav/stacker

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create server-equivalent .env.production for build
        run: |
          cat > .env.production <<'EOF'
          NEXT_PUBLIC_APP_NAME=Stacker
          NEXT_PUBLIC_PAGE_TITLE=Stacker
          NEXT_PUBLIC_LOGO_PATH=/logo.svg
          NEXT_PUBLIC_FAVICON_PATH=/icon.svg
          NEXT_PUBLIC_SITE_URL=https://stacker.proniit.com
          EOF

      - name: Set lowercase image name
        run: |
          echo "IMAGE_FULL=${REGISTRY}/${IMAGE_NAME}:latest" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Stacker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_FULL }}
            ${{ env.IMAGE_SHA }}